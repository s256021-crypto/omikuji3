<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恋御籤</title>
  <style>
    body {
      background-color: #fdf5e6;
      font-family: "Hiragino Mincho ProN", "MS PMincho", serif;
      text-align: center;
      padding-top: 50px;
      color: #333;
    }
    .omikuji-box {
      background-color: #fff8dc;
      padding: 30px;
      border: 5px double #b22222;
      border-radius: 10px;
      width: 320px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }
    h2 {
      color: #b22222;
      border-bottom: 2px solid #b22222;
      padding-bottom: 10px;
    }
    #omikuji-result {
      min-height: 180px;
      margin-top: 20px;
    }
    .result-image {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
      margin: 10px auto 0 auto;
    }
    button {
      background-color: #b22222;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }
    button:hover {
      background-color: #8b0000;
    }
    .fortune {
      font-size: 2em;
      font-weight: bold;
      color: #d4af37;
      margin: 0;
    }
    .message {
      font-size: 1em;
      color: #333;
      margin-top: 10px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="omikuji-box">
    <h2>恋御籤</h2>
    <div id="omikuji-result">
      <p>あなたの運勢を占います</p>
    </div>
    <button id="draw-button" type="button">おみくじを引く</button>
  </div>

  <script>
    const fortunes = ["大吉", "吉", "中吉", "末吉", "凶", "大凶"];
    const loveMessages = [
      "誠意を持って接すれば、思いは通じます。",
      "新しい出会いがすぐそばにあります。",
      "焦らず、自分磨きに専念しましょう。",
      "今は静かに待つのが吉。無理な行動は控えて。",
      "相手の気持ちを尊重することを忘れずに。",
      "過去の執着を捨てると、新しい運気が入ってきます。"
    ];

    const imagesDict = {
      "大吉": [
        "omikuji_image.jpg"
      ],
      "吉": [
        "omikuji_image.jpg"
      ],
      "中吉": [
        "omikuji_image.jpg"
      ],
      "末吉": [
        "omikuji_image.jpg"
      ],
      "凶": [
        "omikuji_image.jpg"
      ],
      "大凶": [
        "omikuji_image.jpg"
      ]
    };

    function setButtonDisabled(button) {
      button.disabled = true;
      button.textContent = "おみくじは引かれました";
      button.style.cursor = "not-allowed";
      button.style.opacity = "0.7";
    }

    function renderResult(fortune, message, imageUrl) {
      const resultDiv = document.getElementById("omikuji-result");
      const imageHtml = imageUrl ? `<img class="result-image" src="${imageUrl}" alt="おみくじ画像">` : "";
      resultDiv.innerHTML = `
        ${imageHtml}
        <p class="fortune">${fortune}</p>
        <p class="message">${message}</p>
      `;
    }

    function chooseImage(fortune) {
      const candidates = imagesDict[fortune] || [];
      if (!candidates.length) return null;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function drawOmikuji() {
      const button = document.getElementById("draw-button");
      if (button.disabled) return;

      const fortune = fortunes[Math.floor(Math.random() * fortunes.length)];
      const message = loveMessages[Math.floor(Math.random() * loveMessages.length)];
      const imageUrl = chooseImage(fortune);

      renderResult(fortune, message, imageUrl);
      setButtonDisabled(button);
    }

    document.getElementById("draw-button").addEventListener("click", drawOmikuji);
  </script>
</body>
</html>
